<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1080, height=1440"/>
  <title>Slide 8 — CTA MVP Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1080px; height: 1440px; overflow: hidden; font-family: 'Sora', sans-serif; background: #FAFAFA; color: #18181B; position: relative; }
    .pill { position: absolute; top: 48px; left: 100px; background: #0a0a0a; color: #fff; padding: 6px 18px; border-radius: 999px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; z-index: 10; }
    .nav-circle { position: absolute; top: 48px; right: 100px; width: 48px; height: 48px; border: 2px solid rgba(0,0,0,.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; font-size: 20px; color: #18181B; }
    .wrap { position: relative; padding: 100px 100px 180px; z-index: 4; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .headline { font-size: 48px; font-weight: 800; line-height: 1.15; margin-bottom: 32px; color: #18181B; }
    .headline .accent { color: #7C3AED; }
    .body { font-size: 26px; font-weight: 400; line-height: 1.5; color: #71717A; margin-bottom: 48px; }
    .cta { display: inline-block; background: #7C3AED; color: #fff; padding: 20px 44px; border-radius: 999px; font-weight: 700; font-size: 28px; text-decoration: none; }
    .dots { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; z-index: 10; }
    .dots span { width: 7px; height: 7px; border-radius: 50%; background: rgba(0,0,0,0.2); }
    .dots span.active { background: #7C3AED; }
  </style>
</head>
<body>
  <div class="pill">MVP FLOW</div>
  <div class="nav-circle">→</div>
  <div class="wrap">
    <h2 class="headline">Pronto para <span class="accent">orquestrar</span>?</h2>
    <p class="body">A MVP Flow ajuda você a montar sistemas de IA que integram modelos, ferramentas e fluxos. Desenvolvimento e empreendedorismo com IA, na prática.</p>
    <a href="#" class="cta">Conheça a MVP Flow</a>
  </div>
  <div class="dots"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span class="active"></span></div>
</body>
</html>
